<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Contact - Portfolio Website</title>
</head>
<body class="jt">

<canvas></canvas>

<div class="transition-circle"></div>
<div class="transition-circle-2"></div>

<header>
    <a href="index.html" class="logo">Profile</a>

    <nav>
        <a href="index.html">Home</a>
        <a href="portofolio.html">Portfolio</a>
        <a href="contact.html" class="active">Contact</a>
    </nav>
    <div class="mode-toggle">
        <input type="checkbox" id="mode-switch">
        <label for="mode-switch" class="toggle-label">
            <i class="fas fa-sun"></i>
            <i class="fas fa-moon"></i>
        </label>
    </div>
    <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </div>
</header>

<section class="contact">
    <br>
    <br>
    <br>
    <h2>Contact Me</h2>
    <div class="contact-container">
        <div class="contact-info">
            <h3>Get in Touch</h3>
            <p>Feel free to reach out to me for any inquiries or collaborations.</p>
            <div class="info-item">
                <i class="fas fa-envelope"></i>
                <span>your.email@example.com</span>
            </div>
            <div class="info-item">
                <i class="fas fa-phone"></i>
                <span>+123 456 7890</span>
            </div>
            <div class="info-item">
                <i class="fas fa-map-marker-alt"></i>
                <span>Your Location</span>
            </div>
            <div class="social-icons">
                <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                <a href="#"><i class="fa-brands fa-github"></i></a>
                <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
        <div class="contact-form">
            <form action="#" method="post">
                <div class="form-group">
                    <input type="text" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <input type="text" name="subject" placeholder="Subject" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </div>
    </div>
</section>

<script src="script.js"></script>

</body>
</html>
